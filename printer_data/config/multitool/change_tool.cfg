#####################################################################
# CxChanger 换头路径模板
#
# 方案来源:
#   https://github.com/cx330-TXY/CxChanger
#
# 安装脚本选择 CxChanger 时会复制本文件到：
#   ~/printer_data/config/multitool/change_tool.cfg
#
# 使用前必须按机器实测修改：
#   - 每个工具的 dock_x / dock_y
#   - dock_shift_x / dock_dodge_y / dock_safe_y
#   - feed_safe / feed_fast / feed_slow
#####################################################################


#####################################################################
# 停靠坞参数集中管理
#####################################################################
# CxChanger 方案的所有停靠坞参数集中放在这个宏变量容器中
[gcode_macro _multitool_cfg]
description: CxChanger 磁吸停靠坞参数

# --- 速度 ---
# variable_feed_safe:        15000    # 安全区域快速移动速度，单位 mm/min
# variable_feed_fast:        1200     # 进入/退出停靠坞的常规速度，单位 mm/min
# variable_feed_slow:        400      # 开合摆臂、磁吸结合/分离的低速动作速度，单位 mm/min

variable_feed_safe:        500    # 安全区域快速移动速度，单位 mm/min
variable_feed_fast:        40     # 进入/退出停靠坞的常规速度，单位 mm/min
variable_feed_slow:        30      # 开合摆臂、磁吸结合/分离的低速动作速度，单位 mm/min

# --- 停靠坞运动逻辑参数 ---
variable_dock_shift_x: -3.5         # X 方向横移距离，用于开合 CxChanger 摆臂；方向不对时改正负号
variable_dock_dodge_y: 14           # Y 方向避让距离，用于磁吸分离/结合前后的避让位置
variable_dock_safe_y:  25           # 每个 dock 前方安全入口距离，工具头先到这里再进入 dock

# --- 各热端停靠坞坐标：请按机器实测修改 ---
variable_t0_dock_x: 302.8            # 【必改】T0 停靠坞中心 X 坐标
variable_t0_dock_y: -6               # 【必改】T0 停靠坞中心 Y 坐标
variable_t1_dock_x: 272.8            # 【必改】T1 停靠坞中心 X 坐标
variable_t1_dock_y: -6               # 【必改】T1 停靠坞中心 Y 坐标
variable_t2_dock_x: 242.8            # 【必改】T2 停靠坞中心 X 坐标
variable_t2_dock_y: -6               # 【必改】T2 停靠坞中心 Y 坐标
variable_t3_dock_x: 212.8            # 【必改】T3 停靠坞中心 X 坐标
variable_t3_dock_y: -6               # 【必改】T3 停靠坞中心 Y 坐标
variable_t4_dock_x: 182.8            # 【必改】T4 停靠坞中心 X 坐标
variable_t4_dock_y: -6               # 【必改】T4 停靠坞中心 Y 坐标
variable_t5_dock_x: 152.8            # 【必改】T5 停靠坞中心 X 坐标
variable_t5_dock_y: -6               # 【必改】T5 停靠坞中心 Y 坐标
variable_t6_dock_x: 122.8            # 【必改】T6 停靠坞中心 X 坐标
variable_t6_dock_y: -6               # 【必改】T6 停靠坞中心 Y 坐标

gcode:
    # 仅作变量容器             # 保留空 gcode，避免 Klipper 认为宏无内容


#####################################################################
# 释放热端：将当前热端放回停靠坞
#####################################################################
# CxChanger 放回工具动作，由 multitool_release_tool 转发调用
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _multitool_cfg"] %} # 读取上方 _multitool_cfg 中的所有变量
    {% set tool = params.TOOL|int %} # 当前需要放回的工具号，由主插件传入
    {% set prefix = "t" ~ tool %}    # 拼出 t0/t1/t2 这样的变量名前缀

    {% set dock_x = cfg[prefix + "_dock_x"] %} # 当前工具停靠坞中心 X
    {% set dock_y = cfg[prefix + "_dock_y"] %} # 当前工具停靠坞中心 Y
    {% set shift_x = cfg.dock_shift_x %}       # 开合摆臂的 X 横移距离
    {% set dodge_y = cfg.dock_dodge_y %}       # 磁吸分离用 Y 避让距离
    {% set safe_y  = cfg.dock_safe_y %}        # dock 前方安全入口距离

    M118 正在放回 T{tool}             # 在前端控制台提示当前动作

    G90                               # 使用绝对坐标，避免受打印文件相对坐标状态影响
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe} # 先移动到 dock 前方安全入口
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}          # 沿 Y 进入 dock 中心
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow} # X 横移打开/错开摆臂
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # Y 后退完成磁吸分离
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # X 回位闭合摆臂
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}  # 退出到 dock 前方安全入口
    M400                              # 等待所有运动完成，确保主流程后续状态正确


#####################################################################
# 抓取热端：从停靠坞抓起目标热端
#####################################################################
# CxChanger 抓取工具动作，由 multitool_pickup_tool 转发调用
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _multitool_cfg"] %} # 读取上方 _multitool_cfg 中的所有变量
    {% set tool = params.TOOL|int %} # 当前需要抓取的工具号，由主插件传入
    {% set prefix = "t" ~ tool %}    # 拼出 t0/t1/t2 这样的变量名前缀

    {% set dock_x = cfg[prefix + "_dock_x"] %} # 目标工具停靠坞中心 X
    {% set dock_y = cfg[prefix + "_dock_y"] %} # 目标工具停靠坞中心 Y
    {% set shift_x = cfg.dock_shift_x %}       # 开合摆臂的 X 横移距离
    {% set dodge_y = cfg.dock_dodge_y %}       # 磁吸结合前的 Y 避让距离
    {% set safe_y  = cfg.dock_safe_y %}        # dock 前方安全入口距离

    M118 正在抓取 T{tool}             # 在前端控制台提示当前动作

    G90                               # 使用绝对坐标，避免受打印文件相对坐标状态影响
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe} # 先移动到 dock 前方安全入口
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast} # 进入避让位置，准备开摆臂
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # X 横移打开/错开摆臂
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow} # Y 前进让磁吸工具结合
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}           # X 回位闭合摆臂并锁定工具

    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}  # 带着工具退出到 dock 前方安全入口
    M400                              # 等待所有运动完成，确保主流程后续状态正确
