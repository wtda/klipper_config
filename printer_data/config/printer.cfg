[gcode_macro G32]
gcode:
    BED_MESH_CLEAR                 # 卸载网床
    G28                            # 归位所有轴
    QUAD_GANTRY_LEVEL              # 龙门架调平
    G28                            # 归位所有轴
    G0 X125 Y125 Z30 F3600         # 250mm
    # G0 X150 Y150 Z30 F3600        # 300mm
    #G0 X175 Y175 Z30 F3600        # 350mm
#--------------------------------------------------------------------
[gcode_macro PRINT_START]          # 将 PRINT_START 设置为开始打印时的宏，自定义打印前的动作
gcode:
    SET_VELOCITY_LIMIT ACCEL=10000 # 恢复加速度
    
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.EXTRUDER|int %}

    # 判断是否归零
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 # 归位所有轴
    {% endif %}
    G1 X125 Y125 Z25 F3000
    M190 S{bedtemp}                # 热床加热
    G92 E0                         #重置挤出
    BED_MESH_CLEAR                 # 卸载网床
    QUAD_GANTRY_LEVEL              # 龙门架调平

    bed_mesh_calibrate adaptive=1 

    {% if curr_bed_type=="Textured PEI Plate" %}         # 纹理PEI板
        IDM_MODEL_SELECT NAME=PEI                      # 使用PEI配置
        M104 S145                                      # 喷嘴加热到145
        # SET_LED LED=SBLED RED=0.6 GREEN=0.0 BLUE=0.0
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=143
        PROBE_CALIBRATE METHOD=AUTO                    # 使用Touch自动Z
        # G28 Z
    {% endif %}

    {% if curr_bed_type=="Textured Cool Plate" %}        # 纹理的低温打印床
        IDM_MODEL_SELECT NAME=CAB                      # 使用碳纤维配置
        G28 Z
    {% endif %}

    # 判断是否有自适应网床参数
    # {% if params.MESH_MIN %}
    #     #M117 ADAPTIVE BED MESH          ; 向屏幕发送文字
    #     # 此处接收来自Orca的自适应网床参数，需要软件中配置传参
    #     BED_MESH_CALIBRATE mesh_min={params.MESH_MIN} mesh_max={params.MESH_MAX} ALGORITHM={params.MESH_ALGO} PROBE_COUNT={params.PROBE_COUNT} ADAPTIVE=1 ADAPTIVE_MARGIN=0
    # {% else %}
    #     #M117 BED MESH          ; 向屏幕发送文字
    #     BED_MESH_PROFILE LOAD=default  # 加载网床
    # {% endif %}

    
    
    # SET_LED LED=SBLED RED=1 GREEN=0.0 BLUE=0.0
    M104 S{hotendtemp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotendtemp-1} 
    # SET_LED LED=SBLED RED=0.1 GREEN=0.1 BLUE=0.1   # LED灯控制
    G92 E0
    G1 X55.0 Y0.0 Z0.25 F5000.0 ;Move to start position
    G1 X105.0 Y0.0 Z0.22 F1500.0 E10 ;Draw the first line
    # G1 X20.4 Y200.0 Z0.25 F5000.0 ;Move to side a little
    # G1 X20.4 Y100 Z0.22 F1500.0 E15 ;Draw the second line    
    # G92 E0
    G1 Z2.0 F3000 ;Move Z Axis up
    # MR_NOTIFY TITLE="$printer_name" MESSAGE="Start Print!"
    #M117 Printing                  # 向屏幕发送文本

