#####################################################################
#                             风扇配置
#####################################################################
# [fan]                        # 模型冷却风扇
[fan_generic Part_Cooling_Fan]
#模型冷却风扇
pin: EBBCan: PA0                   # 信号接口
kick_start_time: 0.5         # 启动时间（勿动）
off_below: 0.10              # 勿动
#--------------------------------------------------------------------
[heater_fan hotend_fan]      # 喉管冷却风扇
pin: EBBCan: PA1                      # 信号接口
max_power: 1.0               # 最大转速
kick_start_time: 0.5         # 启动时间（勿动）
heater: extruder             # 关联的设备：挤出机
heater_temp: 50              # 挤出机达到多少度启动风扇
fan_speed: 0.85              # 风扇转速
# #--------------------------------------------------------------------
[fan_generic Skirts]  # 树莓派风扇 todo
pin: PD12                    # 信号接口
max_power: 1.0               # 最大转速
shutdown_speed: 0.0        # 关闭速度（勿动）
kick_start_time: 5.0         # 开启时间（勿动）
[temperature_fan Raspberry_pi_fan]
pin: PE5
max_power: 1
hardware_pwm: False
control: pid
pid_Kp=50
pid_Ki=1
pid_Kd=1
min_speed: 0.4
kick_start_time: 0
shutdown_speed: 1

# max_delta: 2
sensor_type: temperature_host
min_temp: 10
max_temp: 80
target_temp: 50
#--------------------------------------------------------------------

# [fan_generic stepper_fan]     # 排风扇
# pin: PD13                    # 信号接口
# max_power: 1.0               # 最大转速
# shutdown_speed: 0.0        # 关闭速度（勿动）
# kick_start_time: 5.0         # 开启时间（勿动）

[controller_fan TMC_fan]
pin:PD13
max_power:1
#shutdown_speed:
# cycle_time:0.45
hardware_pwm:False
# #   启用此选项以使用硬件PWM而非软件PWM。大多数风扇不适合使用硬件PWM，因此除非有电气需求以非常高的速度切换，否则不建议
# #   启用此功能。当使用硬件PWM时，实际的周期时间受到实现的限制，能与请求的周期时间有很大的不同。默认值为False。
kick_start_time:0.1

fan_speed: 0.8
#    当加热器或步进驱动器活跃时，将设置风扇速度（表示为从 0.0 到 1.0 的值）。
#    默认值为 1.0。
idle_timeout:60
#    在步进驱动器或加热器不再活跃后风扇应保持运行的时间（以秒为单位）。
#    默认值为 30 秒。
idle_speed:0
#    当步进驱动器或加热器不再活跃后并且达到 idle_timeout 之前，将设置风扇速度
#    （表示为从 0.0 到 1.0 的值）。
#    默认值为 fan_speed。
stepper: stepper_x,stepper_y
#    定义与此风扇相关联的加热器/步进器的配置分段的名称。如果在此处提供了逗号分隔的
#    加热器/步进器名称列表，则当任何给定的加热器/步进器启用时，将启用该风扇。
#    默认加热器为 "extruder"，默认步进器为所有步进器。
#--------------------------------------------------------------------
[fan_generic exhaust]
# 4-pin computer PWM exhaust fan - FAN5
pin: !PD15
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 2.0
# The official PC fan spec calls for 21-28kHz PWM frequency, but my Noctua at least was happy with the default 100Hz software PWM. So if your controller doesn't support hardware_pwm then try leaving these two lines out:
hardware_pwm: True
cycle_time: 0.00004 # 25 kHz

[fan_generic CameraFan]
pin: PA8 # Change me
#cycle_time: 0.05
kick_start_time: 0.5

[led LED]
white_pin:PD14
hardware_pwm: False
initial_WHITE: 0.0

