# description: 打开驱动散热
# gcode:
#     SET_FAN_SPEED FAN=stepper_fan SPEED=0.5 
#     # SET_FAN_SPEED FAN=Skirts SPEED=0.25
[gcode_macro Close_dock]
gcode:
    G1 Y20 F8000
    G1 X125 F8000
    
[gcode_macro PRINT_END]            # 将 PRINT_END 设置为打印结束时的宏，自定义打印完成之后动作
gcode:
    # SET_LED LED=my_neopixel RED=0.1 GREEN=0.1 BLUE=0.1
    M400                           # 等待缓冲区清除
    G92 E0                         # 将挤出机归零
    G1 E-10.0 F3600                # 缩回耗材丝
    G91                            # 相对定位
    G0 Z1.00 X2.00 Y2.00 F8000    # 移动喷嘴以移除架线
    TURN_OFF_HEATERS               # 关闭热端
    M107                           # 关闭风扇
    G1 Z10 F3000                    # 将喷嘴向上移动2毫米
    G90                            # 绝对定位
    G1 Y235 F8000
    G1 X79 F8000 # 先移动到刀片上
    G1 Y248 F8000
    # G0  X180 Y246 F3600            # 将喷嘴停在后部
    BED_MESH_CLEAR                 # 卸载网床
    # SET_LED LED=SBLED RED=0.1 GREEN=0.1 BLUE=0.1   # LED灯控制
    SET_FAN_SPEED FAN=exhaust SPEED=1   #排风
    
    UPDATE_DELAYED_GCODE ID=close_Exhaust_fan DURATION=120 #俩分钟后关闭排风
    MR_NOTIFY TITLE="$printer_name" MESSAGE="Print Done!"
    #M117  Idle                     # 向屏幕发送文本
    #UPDATE_DELAYED_GCODE ID=powerOFF DURATION=600     # 延迟 600 秒关机(搭配以下打完关机配置，如无模块请注释掉或删除）

