#####################################################################
#                            机型和加速度
#####################################################################
[printer]
kinematics: corexy           # 打印机类型：corexy
max_velocity: 500            # 最大速度（最大 300）
max_accel: 15000              # 最大加速度（最大 4000）
# max_accel_to_decel: 15000     # 最大加速至减速（最大 4000）
max_z_velocity: 10           # Z轴最大速度 10
max_z_accel: 350             # Z轴最大加速度 350
square_corner_velocity: 5.0  # 方形拐角速度

#####################################################################
# 	                         热床网格校准
#####################################################################
[bed_mesh]
speed: 400                    # 校准速度
horizontal_move_z: 5        # Z轴运动速度
mesh_min: 30,30 #30,30              # 最小校准点坐标x，y
mesh_max: 220,220#170, 170           # 最大校准点坐标x，y
probe_count: 20,20             # 采样点数（4X4为16点）
# mesh_pps: 2,2                # 补充采样点数
algorithm: bicubic           # 算法模型
bicubic_tension: 0.2         # 算法插值不要动
# relative_reference_index: 7  # 第多少个点作为±0.00  （最好将点位设置在热床中间或者较平处）（解决热床校准之后在空中的问题）
zero_reference_position: 125, 125    

#####################################################################
#                            X/Y轴电机
#####################################################################
## X 轴步进电机 on MOTOR0(B Motor)
[stepper_x]
step_pin: PF13                # Y轴电机脉冲引脚
dir_pin: PF12                # 方向设置
enable_pin: !PF14             # 使能引脚
rotation_distance: 40         # 主动轮周长mm (2GT-20T为 40mm  16T为 32mm)
microsteps: 128                # 细分
full_steps_per_rotation:200   # 单圈脉冲数-对于0.9度步进设置为400
endstop_pin: EBBCan:PB9             # 限位开关接口
position_min: 0               # 软限位最小行程
position_endstop: 250        # 软限位最大行程 (250mm-300mm-350mm)
position_max: 250             # 机械限位最大行程 (250mm-300mm-350mm)
homing_speed: 50              # 复位速度-最大 100
homing_retract_dist: 5        # 后撤距离
homing_positive_dir: true     # 复位方向
# #--------------------------------------------------------------------
# [tmc2209 stepper_x]
# uart_pin: PC4                 # 驱动通信端口
# interpolate: false             # 微步插值256
# run_current: 1.4            # 运行电流mA
# # hold_current: 0.7             # 保持电流mA
# sense_resistor: 0.11         # 驱动采样电阻不要改
# stealthchop_threshold: 0    # 静音阀值

[tmc2240 stepper_x]
cs_pin: PC4     
# spi_software_mosi_pin: PA7
# spi_software_miso_pin: PA6
# spi_software_sclk_pin: PA5
spi_bus: spi1
run_current: 1.4
interpolate: False
# rref: 12300
stealthchop_threshold:0

#####################################################################
#                  Y 轴步进电机 on MOTOR1 (A Motor)
#####################################################################
[stepper_y]
step_pin: PG0                 # X轴电机脉冲引脚
dir_pin: PG1                  # 方向设置
enable_pin: !PF15             # 使能引脚
rotation_distance: 40         # 主动轮周长mm （2GT-20T为 40mm  16T为 32mm）
microsteps: 128               # 细分
full_steps_per_rotation:200   # 单圈脉冲数-对于0.9度步进设置为400
endstop_pin: PG9              # 限位开关接口
position_min: 0               # 软限位最小行程
position_endstop: 250         # 软限位最大行程 (250mm-300mm-350mm)
position_max: 250             # 机械限位最大行程 (250mm-300mm-350mm)
homing_speed: 50              # 复位速度-最大 100
homing_retract_dist: 5        # 后撤距离
homing_positive_dir: true     # 复位方向
# #--------------------------------------------------------------------
# [tmc2209 stepper_y]
# uart_pin: PD11                # 驱动通信端口
# interpolate: false             # 微步插值256
# run_current: 1.4           # 运行电流mA
# # hold_current: 0.7             # 保持电流mA
# sense_resistor: 0.11         # 驱动采样电阻不要改
# stealthchop_threshold: 0    # 静音阀值

[tmc2240 stepper_y]
